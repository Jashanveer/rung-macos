			shellScript = "# Replaces Xcode's default \"Embed Watch Content\" PBXCopyFilesBuildPhase\n# with a conditional copy. Apple's embeddedBinaryValidationUtility in\n# Xcode 16+ rejects ANY embedded watchOS app inside an iPhone Simulator\n# host bundle (even one correctly built for watchsimulator). The\n# official PBXCopyFilesBuildPhase auto-registers an entry in the\n# validator's check list, so removing the file after the copy fails —\n# the validator complains the registered file is gone.\n#\n# Using a script phase bypasses validator auto-registration. We copy\n# RungWatch.app to ${TARGET_BUILD_DIR}/${CONTENTS_FOLDER_PATH}/Watch/\n# only for iphoneos hosts (real iPhones / archive). iphonesimulator,\n# macosx, and any other host gets no Watch payload, so no validation\n# runs. Paired iPhone+Watch simulator runs install the watch app\n# through the simulator's own pairing pathway, not via this embed,\n# so skipping is safe there too.\n#\n# The dependency on the RungWatch target is preserved in the Rung\n# target's dependencies array, so RungWatch.app still builds on every\n# host build — it just isn't copied into non-iphoneos host bundles.\nif [ \"$PLATFORM_NAME\" != \"iphoneos\" ]; then\n  echo \"note: Skipping Watch embed for $PLATFORM_NAME host (only iphoneos embeds RungWatch.app).\"\n  exit 0\nfi\n\n# Watch dependency lands in a sibling platform products dir. For an\n# iphoneos host, the matching watch SDK is watchos (device).\nWATCH_PRODUCTS_DIR=\"${BUILD_DIR}/${CONFIGURATION}-watchos\"\nWATCH_SOURCE=\"${WATCH_PRODUCTS_DIR}/RungWatch.app\"\nif [ ! -d \"$WATCH_SOURCE\" ]; then\n  echo \"warning: $WATCH_SOURCE not found — RungWatch dependency may not have built for watchos. Skipping embed.\"\n  exit 0\nfi\n\nWATCH_DEST_DIR=\"${TARGET_BUILD_DIR}/${CONTENTS_FOLDER_PATH}/Watch\"\nmkdir -p \"$WATCH_DEST_DIR\"\nrm -rf \"$WATCH_DEST_DIR/RungWatch.app\"\n/bin/cp -R \"$WATCH_SOURCE\" \"$WATCH_DEST_DIR/\"\necho \"Embedded $WATCH_SOURCE into $WATCH_DEST_DIR/\"\n";
		};
/* End PBXShellScriptBuildPhase section */

